name: Android APK Release

on:
  push:
    tags:
      - "tablet-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish tablet APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Run tests
        run: npm test -- --run

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: npm run android:build:debug

      - name: Prepare release APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk checkFood-tablet-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkFood-tablet-${{ github.ref_name }}
          path: checkFood-tablet-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/tablet-v')
        uses: softprops/action-gh-release@v2
        with:
          name: 平板点餐版 ${{ github.ref_name }}
          body: |
            ## 平板点餐版 ${{ github.ref_name }}

            ### 安装
            1. 下载 `checkFood-tablet-${{ github.ref_name }}.apk`
            2. 发送到安卓平板
            3. 允许安装未知来源应用
            4. 点击 APK 安装

            ### 说明
            - 面向餐厅内部使用
            - 支持多组点餐、备注、合计金额和菜品完成状态
            - 数据保存在平板本地
          files: checkFood-tablet-${{ github.ref_name }}.apk
